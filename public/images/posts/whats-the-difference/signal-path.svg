<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect width="800" height="480" fill="#0a0a0a"/>
  <text x="400" y="36" text-anchor="middle" fill="#fafafa" font-size="22" font-weight="600">Three Signal Paths to Your Ear</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#71717a"/></marker>
    <marker id="am" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#bf00ff"/></marker>
  </defs>

  <!-- helper box style via repeated rect+text -->
  <!-- ROW 1: WIRED -->
  <text x="30" y="92" fill="#22c55e" font-size="14" font-weight="600">Wired headphones</text>
  <g font-size="11.5">
    <rect x="30" y="104" width="92" height="48" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <text x="76" y="133" text-anchor="middle" fill="#d4d4d8">Source</text>
    <line x1="122" y1="128" x2="158" y2="128" stroke="#71717a" stroke-width="2" marker-end="url(#a)"/>
    <rect x="160" y="104" width="110" height="48" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <text x="215" y="126" text-anchor="middle" fill="#d4d4d8">DAC + Amp</text>
    <text x="215" y="142" text-anchor="middle" fill="#71717a" font-size="10">in source</text>
    <line x1="270" y1="128" x2="320" y2="128" stroke="#22c55e" stroke-width="2.5" marker-end="url(#a)"/>
    <text x="295" y="120" text-anchor="middle" fill="#22c55e" font-size="10">analog</text>
    <rect x="322" y="104" width="100" height="48" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <text x="372" y="133" text-anchor="middle" fill="#d4d4d8">Driver</text>
    <text x="450" y="125" fill="#a1a1aa" font-size="12">Full analog signal end to end —</text>
    <text x="450" y="143" fill="#a1a1aa" font-size="12">nothing is compressed.</text>
  </g>

  <line x1="30" y1="178" x2="770" y2="178" stroke="#27272a" stroke-width="1" stroke-dasharray="2 6"/>

  <!-- ROW 2: BLUETOOTH -->
  <text x="30" y="214" fill="#bf00ff" font-size="14" font-weight="600">Bluetooth (AirPods Pro · Sony · Bose)</text>
  <g font-size="11">
    <rect x="30" y="226" width="80" height="46" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <text x="70" y="253" text-anchor="middle" fill="#d4d4d8">Source</text>
    <line x1="110" y1="249" x2="140" y2="249" stroke="#bf00ff" stroke-width="2" marker-end="url(#am)"/>
    <rect x="142" y="226" width="118" height="46" rx="8" fill="#18181b" stroke="#bf00ff" stroke-width="1.5"/>
    <text x="201" y="246" text-anchor="middle" fill="#e4e4e7">Lossy encode</text>
    <text x="201" y="262" text-anchor="middle" fill="#71717a" font-size="9.5">SBC/AAC/aptX/LDAC</text>
    <line x1="260" y1="249" x2="300" y2="249" stroke="#bf00ff" stroke-width="2" marker-end="url(#am)"/>
    <text x="280" y="241" text-anchor="middle" fill="#ef5350" font-size="10">((RF))</text>
    <rect x="302" y="226" width="96" height="46" rx="8" fill="#18181b" stroke="#bf00ff" stroke-width="1.5"/>
    <text x="350" y="253" text-anchor="middle" fill="#e4e4e7">Decode</text>
    <line x1="398" y1="249" x2="428" y2="249" stroke="#bf00ff" stroke-width="2" marker-end="url(#am)"/>
    <rect x="430" y="226" width="104" height="46" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <text x="482" y="246" text-anchor="middle" fill="#d4d4d8">DAC + Amp</text>
    <text x="482" y="262" text-anchor="middle" fill="#71717a" font-size="9.5">in earpiece</text>
    <line x1="534" y1="249" x2="564" y2="249" stroke="#71717a" stroke-width="2" marker-end="url(#a)"/>
    <rect x="566" y="226" width="86" height="46" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <text x="609" y="253" text-anchor="middle" fill="#d4d4d8">Driver</text>
  </g>
  <text x="30" y="296" fill="#a1a1aa" font-size="12">Audio is compressed for the radio link, then rebuilt by electronics inside the earpiece — the whole DAC/amp stage now lives in the bud.</text>

  <line x1="30" y1="322" x2="770" y2="322" stroke="#27272a" stroke-width="1" stroke-dasharray="2 6"/>

  <!-- ROW 3: IEM -->
  <text x="30" y="358" fill="#e4e4e7" font-size="14" font-weight="600">IEM (wired)</text>
  <g font-size="11.5">
    <rect x="30" y="370" width="92" height="48" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <text x="76" y="399" text-anchor="middle" fill="#d4d4d8">Source</text>
    <line x1="122" y1="394" x2="158" y2="394" stroke="#71717a" stroke-width="2" marker-end="url(#a)"/>
    <rect x="160" y="370" width="110" height="48" rx="8" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <text x="215" y="392" text-anchor="middle" fill="#d4d4d8">DAC + Amp</text>
    <text x="215" y="408" text-anchor="middle" fill="#71717a" font-size="10">(dongle / source)</text>
    <line x1="270" y1="394" x2="320" y2="394" stroke="#22c55e" stroke-width="2.5" marker-end="url(#a)"/>
    <text x="295" y="386" text-anchor="middle" fill="#22c55e" font-size="10">analog</text>
    <rect x="322" y="370" width="150" height="48" rx="8" fill="#18181b" stroke="#bf00ff" stroke-width="1.5"/>
    <text x="397" y="392" text-anchor="middle" fill="#e4e4e7">Crossover →</text>
    <text x="397" y="408" text-anchor="middle" fill="#e4e4e7">multi-driver</text>
    <text x="500" y="390" fill="#a1a1aa" font-size="12">Analog like wired, but feeding a</text>
    <text x="500" y="408" fill="#a1a1aa" font-size="12">sealed multi-driver acoustic load.</text>
  </g>
  <text x="400" y="456" text-anchor="middle" fill="#52525b" font-size="11.5">The further left the signal turns lossy or wireless, the more stands between the recording and your eardrum.</text>
</svg>
