<svg viewBox="0 0 800 430" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect width="800" height="430" fill="#0a0a0a"/>
  <text x="400" y="36" text-anchor="middle" fill="#fafafa" font-size="22" font-weight="600">What Makes SHA-256 Trustworthy — 5 Properties</text>
  <text x="400" y="58" text-anchor="middle" fill="#71717a" font-size="12">Every one of these is load-bearing for a blockchain.</text>

  <!-- Row 1 -->
  <g>
    <rect x="40" y="80" width="230" height="100" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <circle cx="66" cy="106" r="12" fill="#1f9bff"/><text x="66" y="110" text-anchor="middle" fill="#0a0a0a" font-size="12" font-weight="700">1</text>
    <text x="86" y="111" fill="#e4e4e7" font-size="14" font-weight="600">Deterministic</text>
    <text x="58" y="138" fill="#a1a1aa" font-size="11.5">Same input → the exact same</text>
    <text x="58" y="156" fill="#a1a1aa" font-size="11.5">hash, every single time.</text>
  </g>
  <g>
    <rect x="285" y="80" width="230" height="100" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <circle cx="311" cy="106" r="12" fill="#1f9bff"/><text x="311" y="110" text-anchor="middle" fill="#0a0a0a" font-size="12" font-weight="700">2</text>
    <text x="331" y="111" fill="#e4e4e7" font-size="14" font-weight="600">Fixed size</text>
    <text x="303" y="138" fill="#a1a1aa" font-size="11.5">Any input, from 1 byte to a</text>
    <text x="303" y="156" fill="#a1a1aa" font-size="11.5">library → exactly 256 bits.</text>
  </g>
  <g>
    <rect x="530" y="80" width="230" height="100" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <circle cx="556" cy="106" r="12" fill="#1f9bff"/><text x="556" y="110" text-anchor="middle" fill="#0a0a0a" font-size="12" font-weight="700">3</text>
    <text x="576" y="111" fill="#e4e4e7" font-size="14" font-weight="600">One-way</text>
    <text x="548" y="138" fill="#a1a1aa" font-size="11.5">Trivial forward; infeasible to</text>
    <text x="548" y="156" fill="#a1a1aa" font-size="11.5">reverse a hash to its input.</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="162" y="210" width="230" height="100" rx="10" fill="#18181b" stroke="#fbbf24" stroke-width="1.5"/>
    <circle cx="188" cy="236" r="12" fill="#fbbf24"/><text x="188" y="240" text-anchor="middle" fill="#0a0a0a" font-size="12" font-weight="700">4</text>
    <text x="208" y="241" fill="#e4e4e7" font-size="14" font-weight="600">Avalanche</text>
    <text x="180" y="268" fill="#a1a1aa" font-size="11.5">Flip one bit of input → about</text>
    <text x="180" y="286" fill="#a1a1aa" font-size="11.5">half the output bits flip.</text>
  </g>
  <g>
    <rect x="408" y="210" width="230" height="100" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
    <circle cx="434" cy="236" r="12" fill="#1f9bff"/><text x="434" y="240" text-anchor="middle" fill="#0a0a0a" font-size="12" font-weight="700">5</text>
    <text x="454" y="241" fill="#e4e4e7" font-size="14" font-weight="600">Collision-resistant</text>
    <text x="426" y="268" fill="#a1a1aa" font-size="11.5">Finding two inputs with the same</text>
    <text x="426" y="286" fill="#a1a1aa" font-size="11.5">hash is practically impossible.</text>
  </g>

  <text x="400" y="360" text-anchor="middle" fill="#a1a1aa" font-size="12.5">Together they turn a hash into an unforgeable fingerprint: unique, fixed-length, and impossible to fake or reverse.</text>
  <text x="400" y="392" text-anchor="middle" fill="#52525b" font-size="11">Avalanche (4) is highlighted because it&apos;s the one doing the tamper-detection work in a chain.</text>
</svg>
