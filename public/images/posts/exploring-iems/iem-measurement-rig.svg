<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect width="800" height="420" fill="#0a0a0a"/>
  <text x="400" y="38" text-anchor="middle" fill="#fafafa" font-size="22" font-weight="600">How an IEM Is Measured</text>
  <text x="400" y="62" text-anchor="middle" fill="#71717a" font-size="13">A transfer-function (dual-FFT) measurement of the whole signal chain</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#bf00ff"/>
    </marker>
    <marker id="arrowRef" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#52525b"/>
    </marker>
  </defs>

  <!-- chain boxes -->
  <g>
    <rect x="40" y="120" width="120" height="70" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="2"/>
    <text x="100" y="150" text-anchor="middle" fill="#e4e4e7" font-size="14" font-weight="600">IEM</text>
    <text x="100" y="170" text-anchor="middle" fill="#71717a" font-size="11">device under test</text>

    <rect x="210" y="120" width="130" height="70" rx="10" fill="#18181b" stroke="#bf00ff" stroke-width="2"/>
    <text x="275" y="148" text-anchor="middle" fill="#e4e4e7" font-size="14" font-weight="600">711 Coupler</text>
    <text x="275" y="168" text-anchor="middle" fill="#71717a" font-size="10.5">occluded-ear sim</text>

    <rect x="390" y="120" width="120" height="70" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="2"/>
    <text x="450" y="150" text-anchor="middle" fill="#e4e4e7" font-size="14" font-weight="600">Mic</text>
    <text x="450" y="170" text-anchor="middle" fill="#71717a" font-size="11">measurement</text>

    <rect x="560" y="120" width="130" height="70" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="2"/>
    <text x="625" y="148" text-anchor="middle" fill="#e4e4e7" font-size="14" font-weight="600">Interface</text>
    <text x="625" y="168" text-anchor="middle" fill="#71717a" font-size="10.5">→ FFT software</text>
  </g>

  <!-- arrows -->
  <line x1="160" y1="155" x2="206" y2="155" stroke="#bf00ff" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="155" x2="386" y2="155" stroke="#bf00ff" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="155" x2="556" y2="155" stroke="#bf00ff" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- pink noise reference loopback -->
  <path d="M625 120 L625 90 L100 90 L100 116" fill="none" stroke="#52525b" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowRef)"/>
  <text x="362" y="83" text-anchor="middle" fill="#a1a1aa" font-size="11.5">pink-noise reference signal (loopback)</text>

  <!-- resulting curve panel -->
  <rect x="120" y="225" width="560" height="165" rx="10" fill="#0f0f10" stroke="#27272a" stroke-width="1.5"/>
  <text x="138" y="248" fill="#a1a1aa" font-size="12" font-weight="600">Resulting frequency response</text>
  <!-- axes -->
  <line x1="150" y1="365" x2="650" y2="365" stroke="#3f3f46" stroke-width="1.5"/>
  <line x1="150" y1="270" x2="150" y2="365" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="150" y="383" text-anchor="middle" fill="#52525b" font-size="10">20 Hz</text>
  <text x="400" y="383" text-anchor="middle" fill="#52525b" font-size="10">1 kHz</text>
  <text x="650" y="383" text-anchor="middle" fill="#52525b" font-size="10">20 kHz</text>
  <text x="138" y="274" text-anchor="end" fill="#52525b" font-size="10">dB</text>
  <!-- curve: bass shelf, ~2k and ~5k resonance peaks, HF rolloff -->
  <path d="M150 300 C200 300 230 305 270 312 C320 320 350 322 380 312 C400 305 410 292 425 296 C445 302 455 318 480 314 C500 311 510 286 525 290 C545 296 555 312 575 322 C605 336 630 348 650 352"
        fill="none" stroke="#bf00ff" stroke-width="2.5"/>
  <circle cx="412" cy="294" r="3.5" fill="#ef5350"/>
  <text x="412" y="284" text-anchor="middle" fill="#ef5350" font-size="10">~2 kHz</text>
  <circle cx="517" cy="288" r="3.5" fill="#ef5350"/>
  <text x="517" y="278" text-anchor="middle" fill="#ef5350" font-size="10">~5 kHz</text>
  <text x="300" y="350" text-anchor="middle" fill="#71717a" font-size="10.5">ear-canal resonances baked into the curve</text>
</svg>
