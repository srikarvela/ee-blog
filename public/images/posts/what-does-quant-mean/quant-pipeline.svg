<svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect width="800" height="560" fill="#0a0a0a"/>
  <text x="400" y="36" text-anchor="middle" fill="#fafafa" font-size="22" font-weight="600">The Quant Pipeline</text>
  <text x="400" y="58" text-anchor="middle" fill="#71717a" font-size="12.5">The loop a systematic firm runs, over and over, faster than the last.</text>

  <defs>
    <marker id="pa" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#1f9bff"/></marker>
    <marker id="pf" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#52525b"/></marker>
  </defs>

  <!-- pipeline row: 6 nodes -->
  <g>
    <g>
      <rect x="40" y="90" width="112" height="60" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
      <circle cx="58" cy="108" r="10" fill="#1f9bff"/><text x="58" y="112" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">1</text>
      <text x="96" y="126" text-anchor="middle" fill="#e4e4e7" font-size="12.5" font-weight="600">Data</text>
    </g>
    <g>
      <rect x="176" y="90" width="112" height="60" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
      <circle cx="194" cy="108" r="10" fill="#1f9bff"/><text x="194" y="112" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">2</text>
      <text x="232" y="126" text-anchor="middle" fill="#e4e4e7" font-size="12.5" font-weight="600">Signals</text>
    </g>
    <g>
      <rect x="312" y="90" width="112" height="60" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
      <circle cx="330" cy="108" r="10" fill="#1f9bff"/><text x="330" y="112" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">3</text>
      <text x="368" y="122" text-anchor="middle" fill="#e4e4e7" font-size="12.5" font-weight="600">Strategy</text>
      <text x="368" y="138" text-anchor="middle" fill="#71717a" font-size="10">/ model</text>
    </g>
    <g>
      <rect x="448" y="90" width="112" height="60" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
      <circle cx="466" cy="108" r="10" fill="#1f9bff"/><text x="466" y="112" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">4</text>
      <text x="504" y="122" text-anchor="middle" fill="#e4e4e7" font-size="12.5" font-weight="600">Risk &amp;</text>
      <text x="504" y="138" text-anchor="middle" fill="#e4e4e7" font-size="12.5" font-weight="600">sizing</text>
    </g>
    <g>
      <rect x="584" y="90" width="112" height="60" rx="10" fill="#18181b" stroke="#22c55e" stroke-width="1.5"/>
      <circle cx="602" cy="108" r="10" fill="#1f9bff"/><text x="602" y="112" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">5</text>
      <text x="640" y="126" text-anchor="middle" fill="#e4e4e7" font-size="12.5" font-weight="600">Execution</text>
    </g>
  </g>

  <!-- arrows between -->
  <g stroke="#1f9bff" stroke-width="2">
    <line x1="152" y1="120" x2="174" y2="120" marker-end="url(#pa)"/>
    <line x1="288" y1="120" x2="310" y2="120" marker-end="url(#pa)"/>
    <line x1="424" y1="120" x2="446" y2="120" marker-end="url(#pa)"/>
    <line x1="560" y1="120" x2="582" y2="120" marker-end="url(#pa)"/>
  </g>

  <!-- market node -->
  <rect x="584" y="196" width="112" height="50" rx="10" fill="#18181b" stroke="#bf00ff" stroke-width="1.5"/>
  <circle cx="602" cy="214" r="10" fill="#bf00ff"/><text x="602" y="218" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">6</text>
  <text x="642" y="226" text-anchor="middle" fill="#e4e4e7" font-size="12.5" font-weight="600">Market</text>
  <line x1="640" y1="150" x2="640" y2="194" stroke="#22c55e" stroke-width="2" marker-end="url(#pa)"/>

  <!-- feedback loop: market -> data -->
  <path d="M584 221 L96 221 L96 154" fill="none" stroke="#52525b" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#pf)"/>
  <text x="330" y="215" text-anchor="middle" fill="#71717a" font-size="10.5">feedback: fills, P&amp;L, and fresh data flow back in</text>

  <!-- legend -->
  <line x1="40" y1="270" x2="760" y2="270" stroke="#27272a" stroke-width="1" stroke-dasharray="2 6"/>
  <g>
    <g>
      <circle cx="58" cy="298" r="10" fill="#1f9bff"/><text x="58" y="302" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">1</text>
      <text x="80" y="295" fill="#e4e4e7" font-size="13" font-weight="600">Data</text>
      <text x="80" y="312" fill="#a1a1aa" font-size="12">Prices, order books, news, anything measurable.</text>
    </g>
    <g>
      <circle cx="58" cy="346" r="10" fill="#1f9bff"/><text x="58" y="350" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">2</text>
      <text x="80" y="343" fill="#e4e4e7" font-size="13" font-weight="600">Signals</text>
      <text x="80" y="360" fill="#a1a1aa" font-size="12">Numbers computed from data that hint at what&apos;s next.</text>
    </g>
    <g>
      <circle cx="58" cy="394" r="10" fill="#1f9bff"/><text x="58" y="398" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">3</text>
      <text x="80" y="391" fill="#e4e4e7" font-size="13" font-weight="600">Strategy / model</text>
      <text x="80" y="408" fill="#a1a1aa" font-size="12">Turns signals into a target position: buy, sell, how much.</text>
    </g>
    <g>
      <circle cx="428" cy="298" r="10" fill="#1f9bff"/><text x="428" y="302" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">4</text>
      <text x="450" y="295" fill="#e4e4e7" font-size="13" font-weight="600">Risk &amp; sizing</text>
      <text x="450" y="312" fill="#a1a1aa" font-size="12">Caps how much to bet so one loss can&apos;t sink you.</text>
    </g>
    <g>
      <circle cx="428" cy="346" r="10" fill="#1f9bff"/><text x="428" y="350" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">5</text>
      <text x="450" y="343" fill="#e4e4e7" font-size="13" font-weight="600">Execution</text>
      <text x="450" y="360" fill="#a1a1aa" font-size="12">Places the orders into the book (post #2&apos;s world).</text>
    </g>
    <g>
      <circle cx="428" cy="394" r="10" fill="#bf00ff"/><text x="428" y="398" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">6</text>
      <text x="450" y="391" fill="#e4e4e7" font-size="13" font-weight="600">Market → feedback</text>
      <text x="450" y="408" fill="#a1a1aa" font-size="12">Fills and P&amp;L flow back; the loop starts again.</text>
    </g>
  </g>

  <text x="400" y="452" text-anchor="middle" fill="#52525b" font-size="11.5">Every stage is code. The firm that runs this loop faster and smarter than the rest wins — which is where the hardware comes in.</text>
</svg>
