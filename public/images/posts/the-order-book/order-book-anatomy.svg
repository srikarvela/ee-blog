<svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect width="800" height="560" fill="#0a0a0a"/>
  <text x="400" y="36" text-anchor="middle" fill="#fafafa" font-size="22" font-weight="600">The Order Book Is Just Two Sorted Lists</text>

  <!-- ===== LEFT: ladder ===== -->
  <text x="60" y="74" fill="#ef5350" font-size="12" font-weight="600">Ask side — sellers</text>
  <text x="60" y="90" fill="#71717a" font-size="10">sorted low → high; lowest is best</text>

  <g font-size="12.5">
    <text x="185" y="118" text-anchor="end" fill="#d4d4d8">$100.06</text>
    <rect x="195" y="107" width="70" height="16" rx="3" fill="#ef5350" opacity="0.5"/>
    <text x="185" y="146" text-anchor="end" fill="#d4d4d8">$100.04</text>
    <rect x="195" y="135" width="48" height="16" rx="3" fill="#ef5350" opacity="0.5"/>
    <!-- best ask -->
    <rect x="55" y="162" width="300" height="24" rx="4" fill="#ef5350" opacity="0.12"/>
    <text x="185" y="179" text-anchor="end" fill="#fafafa" font-weight="600">$100.02</text>
    <rect x="195" y="167" width="95" height="16" rx="3" fill="#ef5350"/>
  </g>

  <!-- spread band -->
  <rect x="55" y="192" width="300" height="26" rx="4" fill="#18181b" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="205" y="209" text-anchor="middle" fill="#bf00ff" font-size="11" font-weight="600">spread = $0.02 · top of book</text>

  <g font-size="12.5">
    <!-- best bid -->
    <rect x="55" y="224" width="300" height="24" rx="4" fill="#34d399" opacity="0.12"/>
    <text x="185" y="241" text-anchor="end" fill="#fafafa" font-weight="600">$100.00</text>
    <rect x="195" y="229" width="88" height="16" rx="3" fill="#34d399"/>
    <text x="185" y="270" text-anchor="end" fill="#d4d4d8">$99.98</text>
    <rect x="195" y="259" width="55" height="16" rx="3" fill="#34d399" opacity="0.5"/>
    <text x="185" y="298" text-anchor="end" fill="#d4d4d8">$99.96</text>
    <rect x="195" y="287" width="100" height="16" rx="3" fill="#34d399" opacity="0.5"/>
  </g>
  <text x="60" y="326" fill="#34d399" font-size="12" font-weight="600">Bid side — buyers</text>
  <text x="60" y="342" fill="#71717a" font-size="10">sorted high → low; highest is best</text>

  <!-- numbered markers -->
  <g font-size="11" font-weight="700">
    <circle cx="325" cy="62" r="10" fill="#1f9bff"/><text x="325" y="66" text-anchor="middle" fill="#0a0a0a">1</text>
    <circle cx="35" cy="115" r="10" fill="#ef5350"/><text x="35" y="119" text-anchor="middle" fill="#0a0a0a">2</text>
    <circle cx="35" cy="290" r="10" fill="#34d399"/><text x="35" y="294" text-anchor="middle" fill="#0a0a0a">3</text>
    <circle cx="315" cy="143" r="10" fill="#1f9bff"/><text x="315" y="147" text-anchor="middle" fill="#0a0a0a">4</text>
    <circle cx="35" cy="174" r="10" fill="#ef5350"/><text x="35" y="178" text-anchor="middle" fill="#0a0a0a">5</text>
    <circle cx="35" cy="236" r="10" fill="#34d399"/><text x="35" y="240" text-anchor="middle" fill="#0a0a0a">6</text>
    <circle cx="205" cy="192" r="10" fill="#bf00ff"/><text x="205" y="196" text-anchor="middle" fill="#0a0a0a">7</text>
    <circle cx="315" cy="295" r="10" fill="#1f9bff"/><text x="315" y="299" text-anchor="middle" fill="#0a0a0a">8</text>
  </g>

  <!-- ===== RIGHT: legend ===== -->
  <line x1="400" y1="60" x2="400" y2="500" stroke="#27272a" stroke-width="1" stroke-dasharray="2 6"/>
  <g>
    <g>
      <circle cx="430" cy="80" r="10" fill="#1f9bff"/><text x="430" y="84" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">1</text>
      <text x="452" y="77" fill="#e4e4e7" font-size="13" font-weight="600">Order book</text>
      <text x="452" y="94" fill="#a1a1aa" font-size="12">Every resting order, kept sorted by price.</text>
    </g>
    <g>
      <circle cx="430" cy="128" r="10" fill="#ef5350"/><text x="430" y="132" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">2</text>
      <text x="452" y="125" fill="#e4e4e7" font-size="13" font-weight="600">Ask side</text>
      <text x="452" y="142" fill="#a1a1aa" font-size="12">Sell orders — lowest price is the best.</text>
    </g>
    <g>
      <circle cx="430" cy="176" r="10" fill="#34d399"/><text x="430" y="180" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">3</text>
      <text x="452" y="173" fill="#e4e4e7" font-size="13" font-weight="600">Bid side</text>
      <text x="452" y="190" fill="#a1a1aa" font-size="12">Buy orders — highest price is the best.</text>
    </g>
    <g>
      <circle cx="430" cy="224" r="10" fill="#1f9bff"/><text x="430" y="228" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">4</text>
      <text x="452" y="221" fill="#e4e4e7" font-size="13" font-weight="600">Price level</text>
      <text x="452" y="238" fill="#a1a1aa" font-size="12">One row: a price + all size resting on it.</text>
    </g>
    <g>
      <circle cx="430" cy="272" r="10" fill="#ef5350"/><text x="430" y="276" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">5</text>
      <text x="452" y="269" fill="#e4e4e7" font-size="13" font-weight="600">Best ask</text>
      <text x="452" y="286" fill="#a1a1aa" font-size="12">Lowest sell price → you buy here.</text>
    </g>
    <g>
      <circle cx="430" cy="320" r="10" fill="#34d399"/><text x="430" y="324" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">6</text>
      <text x="452" y="317" fill="#e4e4e7" font-size="13" font-weight="600">Best bid</text>
      <text x="452" y="334" fill="#a1a1aa" font-size="12">Highest buy price → you sell here.</text>
    </g>
    <g>
      <circle cx="430" cy="368" r="10" fill="#bf00ff"/><text x="430" y="372" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">7</text>
      <text x="452" y="365" fill="#e4e4e7" font-size="13" font-weight="600">Spread / top of book</text>
      <text x="452" y="382" fill="#a1a1aa" font-size="12">Best bid and best ask, and the gap between.</text>
    </g>
    <g>
      <circle cx="430" cy="416" r="10" fill="#1f9bff"/><text x="430" y="420" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">8</text>
      <text x="452" y="413" fill="#e4e4e7" font-size="13" font-weight="600">Depth</text>
      <text x="452" y="430" fill="#a1a1aa" font-size="12">How much size is stacked, level by level.</text>
    </g>
  </g>

  <text x="400" y="530" text-anchor="middle" fill="#52525b" font-size="11.5">Two lists, each sorted so the best price sits at the inside. Everything an exchange does is bookkeeping on this.</text>
</svg>
