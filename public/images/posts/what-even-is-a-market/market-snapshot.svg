<svg viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect width="800" height="540" fill="#0a0a0a"/>
  <text x="400" y="38" text-anchor="middle" fill="#fafafa" font-size="22" font-weight="600">A Market Snapshot, Every Piece Labeled</text>

  <!-- ===== LEFT: the ladder ===== -->
  <text x="60" y="80" fill="#ef5350" font-size="12" font-weight="600">Asks — sellers</text>

  <!-- ask rows: price right-aligned at x=175; size bar from x=185 -->
  <g font-size="12.5">
    <text x="175" y="106" text-anchor="end" fill="#d4d4d8">$100.06</text>
    <rect x="185" y="95" width="70" height="16" rx="3" fill="#ef5350" opacity="0.5"/>
    <text x="175" y="134" text-anchor="end" fill="#d4d4d8">$100.04</text>
    <rect x="185" y="123" width="48" height="16" rx="3" fill="#ef5350" opacity="0.5"/>
    <!-- best ask -->
    <rect x="60" y="150" width="200" height="24" rx="4" fill="#ef5350" opacity="0.12"/>
    <text x="175" y="167" text-anchor="end" fill="#fafafa" font-weight="600">$100.02</text>
    <rect x="185" y="155" width="95" height="16" rx="3" fill="#ef5350"/>
  </g>

  <!-- spread band -->
  <rect x="60" y="180" width="200" height="26" rx="4" fill="#18181b" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="160" y="197" text-anchor="middle" fill="#bf00ff" font-size="11" font-weight="600">spread $0.02</text>

  <!-- mid line -->
  <line x1="60" y1="193" x2="320" y2="193" stroke="#a78bfa" stroke-width="1" stroke-dasharray="2 4" opacity="0.5"/>

  <g font-size="12.5">
    <!-- best bid -->
    <rect x="60" y="212" width="200" height="24" rx="4" fill="#34d399" opacity="0.12"/>
    <text x="175" y="229" text-anchor="end" fill="#fafafa" font-weight="600">$100.00</text>
    <rect x="185" y="217" width="88" height="16" rx="3" fill="#34d399"/>
    <text x="175" y="258" text-anchor="end" fill="#d4d4d8">$99.98</text>
    <rect x="185" y="247" width="56" height="16" rx="3" fill="#34d399" opacity="0.5"/>
    <text x="175" y="286" text-anchor="end" fill="#d4d4d8">$99.96</text>
    <rect x="185" y="275" width="80" height="16" rx="3" fill="#34d399" opacity="0.5"/>
  </g>
  <text x="60" y="312" fill="#34d399" font-size="12" font-weight="600">Bids — buyers</text>

  <!-- last trade marker -->
  <circle cx="300" cy="224" r="5" fill="#fafafa"/>

  <!-- numbered markers on the ladder -->
  <g font-size="11" font-weight="700">
    <circle cx="246" cy="131" r="10" fill="#1f9bff"/><text x="246" y="135" text-anchor="middle" fill="#0a0a0a">1</text>
    <circle cx="40" cy="283" r="10" fill="#1f9bff"/><text x="40" y="287" text-anchor="middle" fill="#0a0a0a">2</text>
    <circle cx="293" cy="163" r="10" fill="#1f9bff"/><text x="293" y="167" text-anchor="middle" fill="#0a0a0a">3</text>
    <circle cx="40" cy="162" r="10" fill="#ef5350"/><text x="40" y="166" text-anchor="middle" fill="#0a0a0a">4</text>
    <circle cx="40" cy="224" r="10" fill="#34d399"/><text x="40" y="228" text-anchor="middle" fill="#0a0a0a">5</text>
    <circle cx="120" cy="193" r="10" fill="#bf00ff"/><text x="120" y="197" text-anchor="middle" fill="#0a0a0a">6</text>
    <circle cx="332" cy="193" r="10" fill="#a78bfa"/><text x="332" y="197" text-anchor="middle" fill="#0a0a0a">7</text>
    <circle cx="318" cy="224" r="10" fill="#fafafa"/><text x="318" y="228" text-anchor="middle" fill="#0a0a0a">8</text>
  </g>

  <!-- ===== RIGHT: legend ===== -->
  <line x1="400" y1="70" x2="400" y2="470" stroke="#27272a" stroke-width="1" stroke-dasharray="2 6"/>
  <g font-size="12.5">
    <g>
      <circle cx="430" cy="92" r="10" fill="#1f9bff"/><text x="430" y="96" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">1</text>
      <text x="452" y="89" fill="#e4e4e7" font-weight="600">Order</text>
      <text x="452" y="106" fill="#a1a1aa">One resting instruction: a side, size, and price.</text>
    </g>
    <g>
      <circle cx="430" cy="140" r="10" fill="#1f9bff"/><text x="430" y="144" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">2</text>
      <text x="452" y="137" fill="#e4e4e7" font-weight="600">Price level</text>
      <text x="452" y="154" fill="#a1a1aa">One row — a price plus all the size resting on it.</text>
    </g>
    <g>
      <circle cx="430" cy="188" r="10" fill="#1f9bff"/><text x="430" y="192" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">3</text>
      <text x="452" y="185" fill="#e4e4e7" font-weight="600">Size / depth</text>
      <text x="452" y="202" fill="#a1a1aa">Bar length = how much is available there.</text>
    </g>
    <g>
      <circle cx="430" cy="236" r="10" fill="#ef5350"/><text x="430" y="240" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">4</text>
      <text x="452" y="233" fill="#e4e4e7" font-weight="600">Best ask</text>
      <text x="452" y="250" fill="#a1a1aa">Lowest seller price → you BUY here.</text>
    </g>
    <g>
      <circle cx="430" cy="284" r="10" fill="#34d399"/><text x="430" y="288" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">5</text>
      <text x="452" y="281" fill="#e4e4e7" font-weight="600">Best bid</text>
      <text x="452" y="298" fill="#a1a1aa">Highest buyer price → you SELL here.</text>
    </g>
    <g>
      <circle cx="430" cy="332" r="10" fill="#bf00ff"/><text x="430" y="336" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">6</text>
      <text x="452" y="329" fill="#e4e4e7" font-weight="600">Spread</text>
      <text x="452" y="346" fill="#a1a1aa">Gap between best ask and best bid ($0.02).</text>
    </g>
    <g>
      <circle cx="430" cy="380" r="10" fill="#a78bfa"/><text x="430" y="384" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">7</text>
      <text x="452" y="377" fill="#e4e4e7" font-weight="600">Mid-price</text>
      <text x="452" y="394" fill="#a1a1aa">Halfway between them ($100.01).</text>
    </g>
    <g>
      <circle cx="430" cy="428" r="10" fill="#fafafa"/><text x="430" y="432" text-anchor="middle" fill="#0a0a0a" font-size="11" font-weight="700">8</text>
      <text x="452" y="425" fill="#e4e4e7" font-weight="600">Last trade</text>
      <text x="452" y="442" fill="#a1a1aa">Most recent agreed price — the quote you see.</text>
    </g>
  </g>

  <text x="400" y="502" text-anchor="middle" fill="#52525b" font-size="11.5">Sellers stack above, buyers stack below, and everything in between is just bookkeeping on those eight pieces.</text>
</svg>
